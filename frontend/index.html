<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureLog Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
            border-radius: 8px;
            color: black;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
        }
    </style>
</head>

<body class="dashboard-page">


<!-- ===============================
     TOP BAR
     =============================== -->
<header class="top-bar">
    <h1>SecureLog Security Dashboard</h1>

    <div class="btn-card">
        <button id="login-btn" class="login-btn" onclick="window.location.href='login.html'">
            Login
        </button>
        <button id="register-btn" class="register-btn" onclick="window.location.href='register.html'">
            Register
        </button>
        <button id="profile-btn" class="nav-btn" style="display:none;" onclick="showProfile()">
            Profile
        </button>
        <button id="logout-btn" class="nav-btn" style="display:none;" onclick="logout()">
            Logout
        </button>
        <button class="nav-btn" onclick="window.location.href='logs.html'">
            View Log History
        </button>

    </div>
</header>

<main>

    <!-- ===============================
         CHARTS
         =============================== -->
    <section id="charts">
        <h2>Log Analytics</h2>

        <div class="charts-grid">
            <div class="chart-container small-chart">
                <canvas id="logsBySourceChart"></canvas>
            </div>

            <div class="chart-container small-chart">
                <canvas id="logsByRiskChart"></canvas>
            </div>
        </div>
    </section>

    <!-- ===============================
         REGISTERED PCS
         =============================== -->
    <section id="registered-pcs">
        <h2>Registered PCs</h2>

        <button id="showRegisteredBtn" class="nav-btn">
            Show Registered PCs ↓
        </button>

        <table id="registeredPcsTable" style="display:none;">
            <thead>
                <tr>
                    <th>Hostname</th>
                    <th>IP</th>
                    <th>Installed</th>
                    <th>Status</th>
                    <th>Last Seen</th>
                </tr>
            </thead>
            <tbody id="registeredPcsBody"></tbody>
        </table>
    </section>

    <!-- ===============================
         LAN DISCOVERY
         =============================== -->
    <section id="lan-discovery">
        <h2>LAN Device Discovery</h2>

        <button id="discoverBtn" class="nav-btn" onclick="discoverLanPCs()">
            Discover LAN PCs ↻
        </button>

        <p id="discoveryMessage"></p>

        <table id="pcsTable" style="display:none;">
            <thead>
                <tr>
                    <th>Hostname</th>
                    <th>IP</th>
                    <th>Agent Installed</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="pcsTableBody"></tbody>
        </table>
    </section>

    <!-- ===============================
         SUMMARY
         =============================== -->
    <section id="summary">
        <div class="card">
            <h3>Total Logs</h3>
            <p id="total-logs">0</p>
        </div>

        <div class="card">
            <h3>Active PCs</h3>
            <p id="active-pcs">0</p>
        </div>

        <div class="card">
            <h3>Alerts</h3>
            <p id="alerts-count">0</p>
        </div>
    </section>

    <!-- ===============================
         ALERTS
         =============================== -->
    <section id="alerts">
        <h2>Recent Alerts</h2>

        <table>
            <thead>
                <tr>
                    <th>PC</th>
                    <th>Severity</th>
                    <th>Message</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="alerts-table"></tbody>
        </table>
    </section>

</main>

<!-- Profile Modal -->
<div id="profile-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <span class="close" onclick="closeProfileModal()">&times;</span>
        <h2>User Profile</h2>
        <p><strong>User ID:</strong> <span id="profile-user-id"></span></p>
        <p><strong>Username:</strong> <span id="profile-username"></span></p>
        <p><strong>Email:</strong> <span id="profile-email"></span></p>
        <button onclick="logout()" style="background: #dc2626; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Logout</button>
    </div>
</div>

<script src="js/dashboard.js"></script>

<script>
function checkLoginStatus() {
    const userId = localStorage.getItem("user_id");
    const loginBtn = document.getElementById("login-btn");
    const registerBtn = document.getElementById("register-btn");
    const profileBtn = document.getElementById("profile-btn");
    const logoutBtn = document.getElementById("logout-btn");

    if (userId) {
        // Logged in: hide login/register, show profile/logout
        loginBtn.style.display = "none";
        registerBtn.style.display = "none";
        profileBtn.style.display = "inline-block";
        logoutBtn.style.display = "inline-block";
    } else {
        // Not logged in: show login/register, hide profile/logout
        loginBtn.style.display = "inline-block";
        registerBtn.style.display = "inline-block";
        profileBtn.style.display = "none";
        logoutBtn.style.display = "none";
    }
}

function logout() {
    localStorage.removeItem("user_id");
    window.location.href = "login.html";
}

function showProfile() {
    const userId = localStorage.getItem("user_id");
    if (!userId) {
        alert("Not logged in");
        return;
    }

    fetch(`http://127.0.0.1:8000/api/auth/user/${userId}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("profile-user-id").innerText = data.id;
        document.getElementById("profile-username").innerText = data.username;
        document.getElementById("profile-email").innerText = data.email;
        document.getElementById("profile-modal").style.display = "block";
    })
    .catch(() => {
        alert("Failed to load profile");
    });
}

function closeProfileModal() {
    document.getElementById("profile-modal").style.display = "none";
}

// Check login status on page load
window.addEventListener("load", checkLoginStatus);

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById("profile-modal");
    if (event.target == modal) {
        modal.style.display = "none";
    }
}
</script>

</body>
</html>
