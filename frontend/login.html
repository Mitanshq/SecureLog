<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>SecureLog Login</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: #ffffff;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

input:focus {
    border-color: #2563eb;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #1d4ed8;
}

/* Footer */
.footer {
    text-align: center;
    margin-top: 15px;
}

.footer a {
    color: #2563eb;
    text-decoration: none;
}

.error {
    color: red;
    font-size: 14px;
    text-align: center;
}
</style>

</head>

<body>

<div class="container">
    <h2>🔐 SecureLog</h2>


<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="error" id="error"></div>

<div class="footer">
    Don't have an account? <a href="register.html">Register</a>
</div>


</div>

<script>
function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;


    fetch("http://127.0.0.1:8000/api/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {
        if(data.user_id){
            localStorage.setItem("user_id", data.user_id);
            window.location.href = "index.html";
        } else {
            document.getElementById("error").innerText = "Invalid credentials";
        }
    })
    .catch(() => {
        document.getElementById("error").innerText = "Server error";
    });
}
</script>

</body>
</html>
